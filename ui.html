<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Annotation Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <!-- Import CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎬 Video Annotation</h1>
        
        <div class="file-upload">
            <input type="file" id="videoFile" class="file-input" accept="video/*">
            <label for="videoFile" class="file-label">📁 Upload Video File</label>
        </div>

        <div class="main-layout">
            <div class="video-section">
                <div class="video-container">
                    <video id="mainVideo" controls="">
                        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <canvas id="annotationCanvas" class="annotation-overlay"></canvas>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="addKeyframe()">⭐ Add Keyframe</button>
                    <button class="btn btn-secondary" onclick="clearAnnotations()">🗑️ Clear All</button>
                    <div class="time-display">
                        Time: <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="keyframe-markers" id="keyframeMarkers"></div>
                    </div>
                </div>

                <div class="annotation-tools">
                    <button class="tool-btn" onclick="setAnnotationMode('rect')" id="rectBtn">📦 Bounding Box</button>
                    <button class="tool-btn" onclick="setAnnotationMode('point')" id="pointBtn">📍 Point</button>
                    <button class="tool-btn" onclick="setAnnotationMode('select')" id="selectBtn">👆 Select</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3>🎯 Keyframes</h3>
                    <div id="keyframeList" class="keyframe-list"></div>
                </div>

                <!-- <div class="panel">
                    <h3>🏷️ Frame Constraints</h3>
                    <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">
                        Selected: <span id="intra-selected">None</span>
                    </div>
                    <input type="text" class="constraint-input" placeholder="e.g., object_visible, good_lighting" id="frameConstraint">
                    <button class="btn btn-primary" onclick="addFrameConstraint()" style="width: 100%; margin-top: 10px;">Add Constraint</button>
                    <div id="frameConstraints"></div>
                </div> -->
                <div class="panel">
                    <h3>🏷️ Frame Constraints</h3>
                    <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">
                        Selected: <span id="intra-selected">None</span>
                    </div>
                
                    <!-- 🔹 JS에서 여기에 keyframe-level + object-level constraint UI를 동적으로 채움 -->
                    <div id="frameConstraints"></div>
                </div>

                <div class="panel">
                    <h3>🔗 Inter-frame Constraints</h3>
                    <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">
                        Selected: <span id="selectedKeyframes">None</span>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.9em; color: #555;">From Keyframe:</label>
                        <select id="fromKeyframe" class="constraint-input" onchange="updateInterFrameUI()">
                            <option value="">Select keyframe...</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.9em; color: #555;">To Keyframe:</label>
                        <select id="toKeyframe" class="constraint-input" onchange="updateInterFrameUI()">
                            <option value="">Select keyframe...</option>
                        </select>
                    </div>
                    <input type="text" class="constraint-input" placeholder="e.g., object_tracking, motion_smooth" id="interFrameConstraint">
                    <button class="btn btn-primary" onclick="addInterFrameConstraint()" style="width: 100%; margin-top: 10px;">Add Constraint</button>
                    <div id="interFrameConstraints"></div>
                </div>


                <div class="panel">
                    <h3>📊 JSON Output</h3>
                    <div id="jsonOutput" class="json-output">Load a video and add annotations...</div>
                    <button class="btn btn-primary" onclick="copyToClipboard()" style="width: 100%; margin-top: 10px;">📋 Copy JSON</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
